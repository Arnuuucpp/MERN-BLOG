<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN Journey | Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0a] text-[#a1a1aa] font-['Inter'] selection:bg-blue-500/30">

    <main class="max-w-2xl mx-auto px-6 py-20">
        
        <header class="mb-16">
            <h1 class="text-white text-3xl font-bold tracking-tight mb-2">The MERN Log</h1>
            <p class="text-zinc-500 text-sm mb-8 italic">"Consistency is the only cheat code."</p>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900/40 border border-zinc-800 p-4 rounded-2xl">
                    <span class="text-[10px] text-zinc-500 uppercase font-bold">Currently Learning</span>
                    <p class="text-white text-sm">REVISING OLD STUFF</p>
                </div>
                <div class="bg-zinc-900/40 border border-zinc-800 p-4 rounded-2xl">
                    <span class="text-[10px] text-zinc-500 uppercase font-bold">Goal</span>
                    <p class="text-white text-sm">MERN GOD</p>
                </div>
            </div>
        </header>

        <div class="mb-12 p-6 bg-red-600/10 border border-grey-500/20 rounded-2xl flex justify-between items-center group transition-all hover:bg-blue-600/15">
            <div>
                <h3 class="text-white font-bold text-sm">Daily Check-in</h3>
                <p class="text-[10px] text-grey-400">Mark today as complete</p>
            </div>
            <button onclick="checkInToday()" class="bg-red-800 hover:bg-blue-400 text-white text-xs font-bold py-2.5 px-6 rounded-full transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                Yes, I Coded Today!
            </button>
        </div>


        <section class="mb-20">
    <div class="flex justify-between items-end mb-4">
        <h2 class="text-white text-xs font-bold uppercase tracking-widest">Consistency Heatmap</h2>
        <span class="text-[10px] font-mono text-zinc-500">YEAR: 2026</span>
    </div>
    
    <div class="border border-white/10 rounded-2xl p-6 bg-zinc-900/10">
        <div id="month-labels" class="flex justify-between text-[9px] text-zinc-600 mb-3 px-1 font-mono uppercase">
        </div>

    <div id="custom-heatmap" class="grid grid-flow-col grid-rows-7 gap-1 overflow-x-auto pb-2 custom-scrollbar">
        </div>
        
        <div class="mt-4 flex justify-between items-center text-[10px] text-zinc-600 font-mono">
            <span>LESS</span>
            <div class="flex gap-1">
                <div class="w-2.5 h-2.5 rounded-sm bg-zinc-900"></div>
                <div class="w-2.5 h-2.5 rounded-sm bg-green-400"></div>
            </div>
            <span>MORE</span>
        </div>
    </div>
</section>

        <section class="space-y-12">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-white text-xs font-bold uppercase tracking-widest">Progress Feed</h2>
                <span id="streak-count" class="text-[10px] text-green-500 font-mono bg-green-500/10 px-2 py-1 rounded">STREAK: 0 DAYS</span>
            </div>

            <div id="feed-container" class="space-y-12">
            </div>
        </section>

        <footer class="mt-32 pt-10 border-t border-zinc-900 text-center">
            <p class="text-[10px] text-zinc-600 tracking-[0.3em]">DON'T STOP UNTIL IT'S DONE</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
